# MongoDB
# For production: set MONGODB_URI environment variable in Render dashboard
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/logistics_erp}
spring.data.mongodb.database=logistics_erp

# Server
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:TTL@ERP@SecretKey@2025@MongoDB@Logistics@Enterprise}
jwt.expiration=86400000

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.logistics=INFO

