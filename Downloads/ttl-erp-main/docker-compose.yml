version: '3.8'
services:
  mongodb:
    image: mongo:6
    container_name: logistics-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: logistics_erp

  backend:
    build: ./backend
    container_name: logistics-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/logistics_erp
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: logistics-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
